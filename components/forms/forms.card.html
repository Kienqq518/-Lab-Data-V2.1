<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--white); color:var(--text-title); padding:22px; }
  .grp { margin-bottom:16px; }
  .lbl { font-size:11px; color:var(--text-secondary); margin-bottom:9px; }
  .row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Input, SearchBar, SegmentedSwitch } = window.DesignSystem_52fd11;
function Demo(){
  const [mode,setMode]=React.useState('device');
  const [q,setQ]=React.useState('');
  return (
    <div>
      <div className="grp"><div className="lbl">Button · 变体 / 尺寸 / 状态</div><div className="row">
        <Button>查询</Button>
        <Button variant="secondary">重置</Button>
        <Button variant="ghost">取消</Button>
        <Button variant="danger">删除</Button>
        <Button size="sm">小</Button>
        <Button size="lg">大按钮</Button>
        <Button disabled>禁用</Button>
      </div></div>
      <div className="grp"><div className="lbl">SegmentedSwitch · 按设备 / 按样品</div><div className="row">
        <SegmentedSwitch value={mode} onChange={setMode} options={[{value:'device',label:'按设备'},{value:'sample',label:'按样品'}]}/>
      </div></div>
      <div className="grp"><div className="lbl">SearchBar · 搜索 + 扫码</div>
        <SearchBar value={q} onChange={e=>setQ(e.target.value)} placeholder="请输入试验编号、试验名称进行搜索" onScan={()=>{}}/>
      </div>
      <div className="grp"><div className="lbl">Input · 普通 / 带单位 / 只读</div><div className="row">
        <Input placeholder="数值" style={{width:160}}/>
        <Input defaultValue="159.88" unit="μΩ" style={{width:160}}/>
        <Input defaultValue="151.49" readOnly style={{width:160}}/>
      </div></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
