<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--bg-app); color:var(--text-title); padding:22px; }
  .lbl { font-size:11px; color:var(--text-secondary); margin:0 0 8px; }
  .grp { margin-bottom:18px; }
  .frame { border:1px solid var(--border-default); border-radius:var(--radius-lg); overflow:hidden; background:var(--white); }
  .cols { display:grid; grid-template-columns:1fr 280px; gap:18px; align-items:start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { AppBar, StationBar, BottomTabBar, SampleListItem } = window.DesignSystem_52fd11;
function Demo(){
  const [tab,setTab]=React.useState('home');
  const [sel,setSel]=React.useState(1);
  const scan = (
    <button style={{width:40,height:40,border:'none',background:'transparent',cursor:'pointer',color:'var(--brand-action)'}}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
    </button>
  );
  return (
    <div className="cols">
      <div>
        <div className="grp"><div className="lbl">AppBar</div><div className="frame"><AppBar title="试验检测" onBack={()=>{}} right={scan}/></div></div>
        <div className="grp"><div className="lbl">StationBar · 工位上下文</div><StationBar station="无人化试验室" onSwitch={()=>{}}/></div>
        <div className="grp"><div className="lbl">BottomTabBar</div><div className="frame"><BottomTabBar active={tab} onChange={setTab} items={[{key:'home',label:'首页',icon:'home'},{key:'me',label:'我的',icon:'user'}]}/></div></div>
      </div>
      <div>
        <div className="lbl">SampleListItem · 左栏</div>
        <div className="frame">
          <SampleListItem index={1} code="SC2025/00701-01" status="testing" selected={sel===1} onClick={()=>setSel(1)}/>
          <SampleListItem index={2} code="SC2025/00702" status="pending" selected={sel===2} onClick={()=>setSel(2)}/>
          <SampleListItem index={3} code="SC2025/00703" status="done" selected={sel===3} onClick={()=>setSel(3)}/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
