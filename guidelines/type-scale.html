<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--white); color:var(--text-title); padding:20px 24px; }
  .line { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--divider); }
  .line:last-child { border-bottom:0; }
  .tok { width:150px; flex:none; font-size:11px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  .spec { color:var(--text-title); }
</style>
</head>
<body>
  <div class="line"><span class="tok">h1 · 28/600</span><span class="spec" style="font:var(--text-h1)">检测任务 试验检测</span></div>
  <div class="line"><span class="tok">h2 · 22/600</span><span class="spec" style="font:var(--text-h2)">无人化试验室 工位</span></div>
  <div class="line"><span class="tok">h3 · 19/600</span><span class="spec" style="font:var(--text-h3)">电缆直流电阻快速测量系统</span></div>
  <div class="line"><span class="tok">lg · 17/400</span><span class="spec" style="font-size:var(--fs-lg)">强调正文 · 样品编号 YM20260528002</span></div>
  <div class="line"><span class="tok">base · 15/400</span><span class="spec" style="font-size:var(--fs-base)">正文基准 · 检测设备 变压器直流电阻测试仪</span></div>
  <div class="line"><span class="tok">sm · 13/400</span><span class="spec" style="font-size:var(--fs-sm);color:var(--text-secondary)">次要信息 · 下发时间 2025-08-27 13:18:10</span></div>
  <div class="line"><span class="tok">xs · 12/600</span><span class="spec" style="font-size:var(--fs-xs);font-weight:600;color:var(--text-secondary)">标签 / 徽章 · 未检测 已上传</span></div>
</body>
</html>
