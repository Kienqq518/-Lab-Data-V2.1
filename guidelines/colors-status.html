<!-- @dsCard group="Colors" viewport="700x190" name="语义状态色" subtitle="未检测印章黄 / 检测中浅蓝 / 已完成绿 / 已逾期红 + 上传状态" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--white); color:var(--text-title); padding:18px 20px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .cell { border:1px solid var(--border-default); border-radius:var(--radius-md); overflow:hidden; }
  .bar { height:44px; display:flex; align-items:center; justify-content:center; }
  .tagline { display:flex; align-items:center; gap:8px; padding:9px 10px; }
  .tag { padding:2px 10px; border-radius:var(--radius-pill); font-size:12px; font-weight:600; }
  .dot { width:11px; height:11px; border-radius:50%; }
  .grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px; }
  .ub { display:flex; align-items:center; gap:8px; padding:10px; border:1px solid var(--border-default); border-radius:var(--radius-md); font-size:13px; font-weight:600; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="bar" style="background:var(--status-pending)"></div><div class="tagline"><span class="tag" style="background:var(--status-pending-bg);color:var(--status-pending-fg)">未检测</span><span class="dot" style="background:var(--status-pending)"></span></div></div>
    <div class="cell"><div class="bar" style="background:var(--status-testing)"></div><div class="tagline"><span class="tag" style="background:var(--status-testing-bg);color:var(--status-testing-fg)">检测中</span><span class="dot" style="background:var(--status-testing)"></span></div></div>
    <div class="cell"><div class="bar" style="background:var(--status-done)"></div><div class="tagline"><span class="tag" style="background:var(--status-done-bg);color:var(--status-done-fg)">已完成</span><span class="dot" style="background:var(--status-done)"></span></div></div>
    <div class="cell"><div class="bar" style="background:var(--status-overdue)"></div><div class="tagline"><span class="tag" style="background:var(--status-overdue-bg);color:var(--status-overdue-fg)">已逾期</span><span class="dot" style="background:var(--status-overdue)"></span></div></div>
  </div>
  <div class="grid2">
    <div class="ub"><span class="dot" style="width:14px;height:14px;background:var(--upload-pending)"></span><span style="color:var(--upload-pending)">未上传 #F59E0B</span></div>
    <div class="ub"><span class="dot" style="width:14px;height:14px;background:var(--upload-done)"></span><span style="color:var(--upload-done)">已上传 #1FAA54</span></div>
  </div>
</body>
</html>
