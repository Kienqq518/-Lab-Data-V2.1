<!-- @dsCard group="Spacing" viewport="700x150" name="间距栅格" subtitle="4px 基准 · 页面边距 20 · 卡片内距 16" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--white); color:var(--text-title); padding:20px; }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--blue-100); border:1px solid var(--blue-200); border-radius:var(--radius-xs); }
  .lab { font-size:11px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:40px"></div><span class="lab">1·4</span></div>
    <div class="item"><div class="box" style="width:8px;height:40px"></div><span class="lab">2·8</span></div>
    <div class="item"><div class="box" style="width:12px;height:40px"></div><span class="lab">3·12</span></div>
    <div class="item"><div class="box" style="width:16px;height:40px"></div><span class="lab">4·16</span></div>
    <div class="item"><div class="box" style="width:20px;height:40px"></div><span class="lab">5·20</span></div>
    <div class="item"><div class="box" style="width:24px;height:40px"></div><span class="lab">6·24</span></div>
    <div class="item"><div class="box" style="width:32px;height:40px"></div><span class="lab">8·32</span></div>
    <div class="item"><div class="box" style="width:40px;height:40px"></div><span class="lab">10·40</span></div>
    <div class="item"><div class="box" style="width:48px;height:40px"></div><span class="lab">12·48</span></div>
  </div>
</body>
</html>
