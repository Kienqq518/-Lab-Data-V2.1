<!-- @dsCard group="Colors" viewport="700x150" name="中性灰阶" subtitle="文字 / 边框 / 表面 · 页面底 #F4F6F9" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--white); color:var(--text-title); }
  .row { display:flex; padding:18px 20px; gap:8px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-default); }
  .chip { height:64px; }
  .meta { padding:7px 8px; }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:10.5px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="meta"><div class="name">900</div><div class="hex">#1A2233</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="meta"><div class="name">700</div><div class="hex">#3C465C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-600)"></div><div class="meta"><div class="name">600</div><div class="hex">#5B6677</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">500</div><div class="hex">#828C9C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="meta"><div class="name">400</div><div class="hex">#AAB2BF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><div class="name">200</div><div class="hex">#E5E8EE</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#EEF1F5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#F4F6F9</div></div></div>
  </div>
</body>
</html>
