<!-- @dsCard group="Colors" viewport="700x150" name="品牌蓝阶" subtitle="Logo 深蓝 #1D3F8C 为主色，#2563EB 为交互蓝" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--white); color:var(--text-title); }
  .row { display:flex; padding:18px 20px; gap:10px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-default); }
  .chip { height:64px; }
  .meta { padding:7px 9px; }
  .name { font-size:12px; font-weight:600; }
  .hex { font-size:11px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
  .star { color:var(--blue-500); font-size:10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="meta"><div class="name">900</div><div class="hex">#14275A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-800)"></div><div class="meta"><div class="name">800</div><div class="hex">#1A347A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">700 <span class="star">★品牌</span></div><div class="hex">#1D3F8C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">600</div><div class="hex">#2150B0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">500 <span class="star">★操作</span></div><div class="hex">#2563EB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><div class="name">300</div><div class="hex">#86AEF6</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">100</div><div class="hex">#DCE8FF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">50</div><div class="hex">#EEF4FF</div></div></div>
  </div>
</body>
</html>
