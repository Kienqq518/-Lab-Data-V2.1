<!-- @dsCard group="检测员App" viewport="800x1280" name="检测员 App · 全流程" subtitle="登录→首页→检测(工位/设备/样品)→采集→上传 可点击 demo" -->
<!-- @startingPoint section="检测员App" subtitle="检测员移动端全流程原型" viewport="800x1280" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>数蚕 Lab Data · 检测员 App</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: #d9dee6; font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #stage { position: relative; }
  #frame {
    width: 800px; height: 1280px; background: var(--bg-app);
    border-radius: 36px; overflow: hidden; position: relative;
    box-shadow: 0 24px 70px rgba(20,30,55,0.35);
    display: flex; flex-direction: column;
  }
  .statusbar {
    height: 30px; flex: none; display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; font-size: 13px; font-weight: 600; color: var(--text-title);
    background: transparent; position: relative; z-index: 5;
  }
  .statusbar.onbrand { color: #fff; background: var(--blue-700); }
  .screen { flex: 1; min-height: 0; overflow: auto; position: relative; }
  @keyframes lk-spin { to { transform: rotate(360deg); } }
  @keyframes lk-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade { animation: lk-fade 0.24s var(--ease-out); }
  /* 底部弹层 */
  .sheet-mask { position: absolute; inset: 0; background: rgba(20,30,55,0.45); z-index: 20; display: flex; align-items: flex-end; animation: lk-fade 0.2s ease; }
  .sheet { width: 100%; background: var(--white); border-radius: 20px 20px 0 0; padding: 8px 0 16px; animation: lk-up 0.26s var(--ease-out); }
  @keyframes lk-up { from { transform: translateY(100%); } to { transform: none; } }
</style>
</head>
<body>
<div id="stage"><div id="frame">
  <div class="statusbar" id="sb"><span>12:00</span><span style="display:flex;gap:6px;align-items:center">
    <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.5 0.7 4.2a10.3 10.3 0 0 1 14.6 0L8 11.5z" opacity="0.95"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13" fill="none" stroke="currentColor"><rect x="0.5" y="0.5" width="22" height="12" rx="3"/><rect x="2" y="2" width="17" height="9" rx="1.5" fill="currentColor" stroke="none"/><rect x="23.5" y="4" width="2" height="5" rx="1" fill="currentColor" stroke="none"/></svg>
  </span></div>
  <div class="screen" id="screen"></div>
</div></div>

<script src="mock.js"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Inspect.jsx"></script>
<script type="text/babel" src="Collect.jsx"></script>
<script type="text/babel" src="CollectStructured.jsx"></script>
<script type="text/babel" src="DoneTasks.jsx"></script>
<script type="text/babel" src="Mine.jsx"></script>
<script type="text/babel">
const { BottomTabBar } = window.DesignSystem_52fd11;

function App() {
  const [authed, setAuthed] = React.useState(false);
  const [tab, setTab] = React.useState('home');           // home | inspect | me
  const [overlay, setOverlay] = React.useState(null);     // null | 'collect'
  const [stationId, setStationId] = React.useState('zy');
  const [ctx, setCtx] = React.useState(null);
  const [sheet, setSheet] = React.useState(false);

  const onBrand = !authed; // status bar white only on login top? login has its own; keep dark
  React.useEffect(() => {
    document.getElementById('sb').className = 'statusbar' + (authed ? '' : ' onbrand');
  }, [authed]);

  let body;
  if (!authed) {
    body = <window.Login onLogin={() => { setAuthed(true); setTab('home'); }} />;
  } else {
    // 主框架（首页 / 检测 / 我的）+ 底部 Tab
    body = (
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        <div className="fade" key={tab} style={{ flex: 1, minHeight: 0, overflow: 'auto', background: 'var(--bg-app)' }}>
          {tab === 'home' && <window.Home onEnterInspect={() => setTab('inspect')} onQuick={(kind) => { if (kind === 'done') setOverlay('done'); else setTab('inspect'); }} />}
          {tab === 'inspect' && <window.Inspect stationId={stationId}
            onSwitchStation={() => setSheet(true)}
            onClearStation={() => setStationId('')}
            onCollect={(c) => { setCtx(c); setOverlay('collect'); }} />}
          {tab === 'me' && <window.Mine onLogout={() => setAuthed(false)} />}
        </div>
        <BottomTabBar active={tab} onChange={setTab}
          items={[{ key: 'home', label: '首页', icon: 'home' }, { key: 'inspect', label: '检测', icon: 'clipboard' }, { key: 'me', label: '我的', icon: 'user' }]} />
      </div>
    );
  }

  return (
    <div style={{ position: 'relative', height: '100%' }}>
      <div className="fade" key={(authed ? 'a' : 'l') + tab} style={{ height: '100%' }}>{body}</div>
      {authed && overlay === 'collect' && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 40, background: 'var(--bg-app)' }}>
          <window.Collect key="col" ctx={ctx}
            onBack={() => setOverlay(null)}
            onDone={() => setOverlay(null)} />
        </div>
      )}
      {authed && overlay === 'done' && (
        <div style={{ position: 'absolute', inset: 0, zIndex: 40, background: 'var(--bg-app)' }}>
          <window.DoneTasks key="done" onBack={() => setOverlay(null)} />
        </div>
      )}
      {sheet && (
        <div className="sheet-mask" onClick={() => setSheet(false)}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div style={{ width: 40, height: 4, borderRadius: 2, background: 'var(--border-strong)', margin: '4px auto 12px' }} />
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px 10px' }}>
              <span style={{ fontSize: 'var(--fs-h3)', fontWeight: 600 }}>选择工位</span>
              <button onClick={() => { setStationId(''); setSheet(false); }}
                style={{ display: 'inline-flex', alignItems: 'center', gap: 4, border: 'none', background: 'transparent', cursor: 'pointer', color: 'var(--text-secondary)', fontSize: 'var(--fs-sm)' }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                清除选择
              </button>
            </div>
            {window.MOCK.stations.map((s) => {
              const on = s.id === stationId;
              return (
                <button key={s.id} onClick={() => { setStationId(s.id); setSheet(false); }}
                  style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%', padding: '15px 20px', border: 'none', borderTop: '1px solid var(--divider)', background: on ? 'var(--surface-selected)' : 'transparent', cursor: 'pointer' }}>
                  <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={on ? 'var(--brand-action)' : 'var(--text-secondary)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    <span style={{ fontSize: 'var(--fs-lg)', fontWeight: on ? 600 : 400, color: on ? 'var(--brand-action)' : 'var(--text-title)' }}>{s.name}</span>
                  </span>
                  <span style={{ fontSize: 'var(--fs-sm)', color: 'var(--text-secondary)' }}>{s.deviceCount} 台设备</span>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function mount() {
  if (!window.DesignSystem_52fd11 || !window.Login || !window.Home || !window.Inspect || !window.Collect || !window.Mine || !window.CollectStructured || !window.DoneTasks) {
    return setTimeout(mount, 60);
  }
  ReactDOM.createRoot(document.getElementById('screen')).render(<App />);
}
mount();

// 缩放适配视口
function fit() {
  const s = Math.min(window.innerWidth / 800, window.innerHeight / 1280);
  document.getElementById('stage').style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit); fit();
</script>
</body>
</html>
